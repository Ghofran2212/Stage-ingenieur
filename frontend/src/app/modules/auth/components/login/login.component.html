<div class="auth-container">
  <div class="auth-card">
    <h2>Connexion</h2>

    <form (ngSubmit)="login()">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="loginData.email"
          name="email"
          required>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input
          type="password"
          [(ngModel)]="loginData.password"
          name="password"
          required>
      </div>

      <button type="submit">
        Se connecter
      </button>

      <p>
        Pas de compte ?
        <a routerLink="/auth/register">Créer un compte</a>
      </p>

    </form>
  </div>
</div>
