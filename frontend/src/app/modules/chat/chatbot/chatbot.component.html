<div class="card-header bg-primary text-white">
  <h3 class="mb-0">🤖 Assistant Touristique</h3>
</div>

<div class="card-body chat-box">

  <div *ngFor="let msg of messages">

    <div
      class="mb-3"
      [ngClass]="{
        'text-end': msg.sender === 'Vous',
        'text-start': msg.sender === 'Bot'
      }">

      <span
        class="badge"
        [ngClass]="{
          'bg-primary': msg.sender === 'Vous',
          'bg-success': msg.sender === 'Bot'
        }">
        {{ msg.sender }}
      </span>

      <div class="p-2 mt-1 rounded border">
        {{ msg.text }}
      </div>

    </div>

  </div>

</div>

<div class="card-footer">

  <div class="input-group">

    <input
      type="text"
      class="form-control"
      placeholder="Posez votre question..."
      [(ngModel)]="question"
      (keyup.enter)="send()">

    <button
      class="btn btn-primary"
      (click)="send()">
      Envoyer
    </button>

  </div>

</div>


  </div>

</div>
