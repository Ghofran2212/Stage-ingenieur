<div class="container mt-4">

  <h2>Mes Réservations</h2>

  <div *ngIf="loading">
    Chargement...
  </div>

  <div *ngIf="error" class="alert alert-danger">
    {{ error }}
  </div>

  <table
    *ngIf="!loading && reservations.length > 0"
    class="table table-striped">

    <thead>
      <tr>
        <th>ID</th>
        <th>Date début</th>
        <th>Date fin</th>
        <th>Personnes</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of reservations">
        <td>{{ r.id }}</td>
        <td>{{ r.dateDebut }}</td>
        <td>{{ r.dateFin }}</td>
        <td>{{ r.nombrePersonnes }}</td>

        <td>
          <button
            class="btn btn-danger btn-sm"
            (click)="deleteReservation(r.id)">
            Supprimer
          </button>
        </td>
      </tr>
    </tbody>

  </table>

  <div
    *ngIf="!loading && reservations.length === 0"
    class="alert alert-info">

    Aucune réservation trouvée.

  </div>

</div>
